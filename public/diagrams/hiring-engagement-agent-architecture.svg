<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Hiring Engagement Agent architecture diagram">
  <defs>
    <style>
      .bg { fill: #0b0f1a; }
      .panel { fill: #111827; stroke: #2b3445; stroke-width: 2; }
      .header { font: 600 20px "Segoe UI", Arial, sans-serif; fill: #f8fafc; }
      .title { font: 600 16px "Segoe UI", Arial, sans-serif; fill: #e5e7eb; }
      .subtitle { font: 400 12px "Segoe UI", Arial, sans-serif; fill: #94a3b8; }
      .arrow { stroke: #38bdf8; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="700" rx="24" ry="24" />
  <text class="header" x="60" y="50">Hiring Engagement Agent Architecture</text>

  <rect class="panel" x="60" y="80" width="230" height="90" rx="16" ry="16" />
  <text class="title" x="80" y="115">Next.js UI</text>
  <text class="subtitle" x="80" y="138">Live SSE traces</text>

  <rect class="panel" x="320" y="80" width="230" height="90" rx="16" ry="16" />
  <text class="title" x="340" y="115">FastAPI API</text>
  <text class="subtitle" x="340" y="138">Async orchestration</text>

  <rect class="panel" x="580" y="60" width="310" height="130" rx="16" ry="16" />
  <text class="title" x="600" y="100">LangGraph Agents</text>
  <text class="subtitle" x="600" y="122">JD Intake, Sourcing, Match</text>
  <text class="subtitle" x="600" y="142">Engage, Interest, Rank</text>

  <rect class="panel" x="930" y="80" width="210" height="90" rx="16" ry="16" />
  <text class="title" x="950" y="115">Ranked Shortlist</text>
  <text class="subtitle" x="950" y="138">Tiered output</text>

  <rect class="panel" x="320" y="240" width="270" height="90" rx="16" ry="16" />
  <text class="title" x="340" y="275">Supabase Postgres</text>
  <text class="subtitle" x="340" y="298">pgvector candidate store</text>

  <rect class="panel" x="620" y="240" width="270" height="90" rx="16" ry="16" />
  <text class="title" x="640" y="275">Trace Store + SSE</text>
  <text class="subtitle" x="640" y="298">Agent steps and logs</text>

  <rect class="panel" x="620" y="380" width="220" height="90" rx="16" ry="16" />
  <text class="title" x="640" y="415">Gemini 2.5</text>
  <text class="subtitle" x="640" y="438">Reasoning and scoring</text>

  <line class="arrow" x1="290" y1="125" x2="320" y2="125" />
  <line class="arrow" x1="550" y1="125" x2="580" y2="125" />
  <line class="arrow" x1="890" y1="125" x2="930" y2="125" />

  <line class="arrow" x1="735" y1="190" x2="455" y2="240" />
  <line class="arrow" x1="735" y1="190" x2="755" y2="240" />
  <line class="arrow" x1="735" y1="190" x2="730" y2="380" />
</svg>
