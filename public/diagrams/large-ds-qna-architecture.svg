<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Big Data Q and A architecture diagram">
  <defs>
    <style>
      .bg { fill: #0b0f1a; }
      .panel { fill: #111827; stroke: #2b3445; stroke-width: 2; }
      .header { font: 600 20px "Segoe UI", Arial, sans-serif; fill: #f8fafc; }
      .title { font: 600 16px "Segoe UI", Arial, sans-serif; fill: #e5e7eb; }
      .subtitle { font: 400 12px "Segoe UI", Arial, sans-serif; fill: #94a3b8; }
      .arrow { stroke: #38bdf8; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="700" rx="24" ry="24" />
  <text class="header" x="60" y="50">Big Data Q and A Agent Architecture</text>

  <rect class="panel" x="60" y="80" width="220" height="90" rx="16" ry="16" />
  <text class="title" x="80" y="115">UI and API</text>
  <text class="subtitle" x="80" y="138">Gradio and FastAPI</text>

  <rect class="panel" x="300" y="80" width="220" height="90" rx="16" ry="16" />
  <text class="title" x="320" y="115">Planner and Router</text>
  <text class="subtitle" x="320" y="138">Direct, SQL, Decompose</text>

  <rect class="panel" x="540" y="60" width="260" height="130" rx="16" ry="16" />
  <text class="title" x="560" y="100">Hybrid Retrieval</text>
  <text class="subtitle" x="560" y="122">FAISS, BM25, DuckDB</text>
  <text class="subtitle" x="560" y="142">RRF and cross-encoder</text>

  <rect class="panel" x="840" y="80" width="220" height="90" rx="16" ry="16" />
  <text class="title" x="860" y="115">Analyst and Critic</text>
  <text class="subtitle" x="860" y="138">Grounded response</text>

  <rect class="panel" x="840" y="210" width="220" height="90" rx="16" ry="16" />
  <text class="title" x="860" y="245">Answer Output</text>
  <text class="subtitle" x="860" y="268">Citations and scores</text>

  <rect class="panel" x="300" y="240" width="220" height="90" rx="16" ry="16" />
  <text class="title" x="320" y="275">Observability</text>
  <text class="subtitle" x="320" y="298">Logs and tracing</text>

  <rect class="panel" x="540" y="240" width="260" height="90" rx="16" ry="16" />
  <text class="title" x="560" y="275">Evaluation</text>
  <text class="subtitle" x="560" y="298">MRR, nDCG, ablation</text>

  <line class="arrow" x1="280" y1="125" x2="300" y2="125" />
  <line class="arrow" x1="520" y1="125" x2="540" y2="125" />
  <line class="arrow" x1="800" y1="125" x2="840" y2="125" />
  <line class="arrow" x1="950" y1="170" x2="950" y2="210" />
  <line class="arrow" x1="670" y1="190" x2="670" y2="240" />
</svg>
